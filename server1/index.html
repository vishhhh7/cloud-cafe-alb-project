<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cloud Café - Server 1</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#141e30,#243b55);
}

.card{
    width:650px;
    padding:40px;
    text-align:center;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
    font-size:42px;
    margin-bottom:15px;
}

.subtitle{
    font-size:18px;
    color:#dcdcdc;
    margin-bottom:30px;
}

.server{
    font-size:36px;
    font-weight:bold;
    color:#00ff88;
    margin-bottom:20px;
}

.badge{
    display:inline-block;
    background:#00ff88;
    color:#000;
    padding:10px 20px;
    border-radius:50px;
    font-weight:bold;
}

.footer{
    margin-top:25px;
    color:#bbb;
}
</style>
</head>

<body>

<div class="card">
    <h1>☕ Cloud Café</h1>

    <p class="subtitle">
        AWS Application Load Balancer Demo
    </p>

    <div class="server">
        🚀 SERVER 1
    </div>

    <div class="badge">
        Healthy Target
    </div>

    <div class="footer">
        Traffic routed through AWS ALB
    </div>
</div>

</body>
</html>
